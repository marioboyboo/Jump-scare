<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relaxing Elevator</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        #start-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            cursor: pointer;
            background: #fff;
            border: 2px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
        }
        #start-btn:hover {
            background: #e0e0e0;
        }
        #status {
            display: none;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>

    <button id="start-btn">Begin Relaxation Session</button>
    <div id="status">Enjoy the silence...</div>

    <audio id="elevator-music" src="musica-elevador-short.mp3"></audio>
    <audio id="pipe-clang" src="metal-pipe-vine-boom.mp3"></audio>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const elevator = document.getElementById('elevator-music');
        const pipe = document.getElementById('pipe-clang');

        startBtn.addEventListener('click', () => {
            // Hide button, show status
            startBtn.style.display = 'none';
            statusText.style.display = 'block';

            // 1. Set elevator music to be "really quiet" (0.1 is 10% volume)
            elevator.volume = 0.1;
            elevator.play();

            // 2. Detect when the elevator music is ending
            elevator.onended = () => {
                // 3. Play the pipes at maximum volume
                pipe.volume = 1.0; 
                pipe.play();
                statusText.innerText = "WAKE UP.";
            };
        });
    </script>
</body>
</html>
